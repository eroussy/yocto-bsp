name: Build and Upload to S3

on:
  # Manual trigger for on-demand builds
  workflow_dispatch:
    inputs:
      build_id:
        type: string
        required: false
        description: >-
          Build identifier for organizing artifacts in S3.
          If not provided, defaults to current timestamp (YYYY-MM-DD-HH-MM-SS).

permissions: read-all

env:
  REPO_MANIFEST_REPOSITORY: 'SEAPATH/repo-manifest'
  REPO_MANIFEST_NAME: 'wrynose.xml'

jobs:
  build-and-upload:
    name: Build and upload Artifacts to S3
    runs-on: ["self-hosted", "runner-sfl-seapath"]
    env:
      WORKSPACE: workspace-bitbake
    defaults:
      run:
        working-directory: ${{ env.WORKSPACE }}
    steps:
      - name: Clean workspace
        working-directory: ${{ github.workspace }}
        run: |
          rm -rf ${{ env.WORKSPACE }}

      - name: Create workspace
        working-directory: ${{ github.workspace }}
        run: mkdir -p ${{ env.WORKSPACE }}

      - name: Set build ID (default to timestamp if not provided)
        working-directory: ${{ github.workspace }}
        run: |
          BUILD_ID='${{ inputs.build_id }}'
          if [ -z "$BUILD_ID" ]; then
            BUILD_ID=$(date +%F-%H-%M-%S)
          fi
          echo "BUILD_ID=$BUILD_ID" >> "$GITHUB_ENV"

      - name: Init repo
        run: |
          repo init \
            -u "${{ github.server_url }}/${{ env.REPO_MANIFEST_REPOSITORY }}" \
            -m "${{ env.REPO_MANIFEST_NAME }}"
          repo sync

      - name: Init build system
        run: cqfd init

      - name: Build release files
        run: |
          # Since we are in a non-interactive bash, the bashrc file is not
          # read and CQFD environment variables are not used, especially the
          # Yocto cache -related ones... Thus we source the bashrc file.
          source /etc/bash.bashrc
          cqfd run tools/make_release.sh --tag ${BUILD_ID}

      - name: Upload to S3
        env:
          S3CMD_ACCESS_KEY: ${{ secrets.S3CMD_ACCESS_KEY }}
          S3CMD_SECRET_KEY: ${{ secrets.S3CMD_SECRET_KEY }}
          S3_BUCKET: s3://seapath-releases
          S3_HOST: e1e604922c4057433cbe77d3700ac51c.r2.cloudflarestorage.com
          S3_HOST_BUCKET: "%(bucket)s.e1e604922c4057433cbe77d3700ac51c.r2.cloudflarestorage.com"
        run: |
          # Install s3cmd if not already available
          which s3cmd || pip install s3cmd

          # Upload artifacts to S3 using Cloudflare R2
          s3cmd \
            --access_key=${S3CMD_ACCESS_KEY} \
            --secret_key=${S3CMD_SECRET_KEY} \
            --host=${S3_HOST} \
            --host-bucket=${S3_HOST_BUCKET} \
            sync release-files/ ${S3_BUCKET}/builds/${BUILD_ID}/

          echo "Build ID: ${BUILD_ID}"
          echo "Bucket: ${S3_BUCKET}"
          ls -lah release-files/
